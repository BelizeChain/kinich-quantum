apiVersion: apps/v1
kind: Deployment
metadata:
  name: kinich-quantum
  namespace: belizechain
  labels:
    app.kubernetes.io/name: kinich-quantum
    app.kubernetes.io/part-of: belizechain
    app.kubernetes.io/component: quantum-compute
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kinich-quantum
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: kinich-quantum
        app.kubernetes.io/name: kinich-quantum
        app.kubernetes.io/part-of: belizechain
        app.kubernetes.io/component: quantum-compute
    spec:
      containers:
        - name: kinich-quantum
          image: belizechainacr.azurecr.io/kinich-quantum:latest
          ports:
            - containerPort: 8888
              name: api
              protocol: TCP
          envFrom:
            - configMapRef:
                name: kinich-quantum-config
            - secretRef:
                name: kinich-quantum-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8888
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8888
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: quantum-results
              mountPath: /app/results
            - name: quantum-logs
              mountPath: /app/logs
      volumes:
        - name: quantum-results
          emptyDir: {}
        - name: quantum-logs
          emptyDir: {}
      restartPolicy: Always
